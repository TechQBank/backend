spring:
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user, user:email

jwt:
  expiration-ms: 2592000000  # 30일

logging:
  file:
    name: logs/app.log

management:
  endpoints:
    web:
      exposure:
        include: health,loggers
  endpoint:
    health:
      show-details: when-authorized
