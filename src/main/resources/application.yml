spring:
  datasource:
    url: jdbc:mysql://localhost:3306/techqbank?serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME:application}
    password: ${DB_PASSWORD:application}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

server:
  port: 8080
