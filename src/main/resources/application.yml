spring:
  datasource:
    url: jdbc:mysql://localhost:3306/techqbank?serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME:application}
    password: ${DB_PASSWORD:application}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user, user:email
server:
  port: 8080


jwt:
  secret: ${JWT_SECRET:localDevSecretKeyMustBeAtLeast256BitsLong1234567890ABCDEF}
  expiration-ms: 2592000000  # 30일

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}
